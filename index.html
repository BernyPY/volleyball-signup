<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Berny & Peggy AfterVolley報名</title>

<meta property="og:title" content="🏐 Berny & Peggy 婚禮排球派對">
<meta property="og:description" content="4/18（六）22:30 - 01:30，點此報名！">
<meta property="og:image" content="https://bernypy.github.io/volleyball-signup/og-image.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://bernypy.github.io/volleyball-signup/">
<meta property="og:type" content="website">

<!-- ===== 設定區（你需要修改這裡）===== -->
<script>
  const CONFIG = {
    GAS_URL: "https://script.google.com/macros/s/AKfycbx_c2TCpZILy4dryJClkEifq7xZrgghMgwzTUSY1o37jJx3bzD6_oiH12kkPaAD70ccMg/exec",
    EVENT_NAME: "Berny & Peggy  AfterVolley",
    EVENT_DATE: "2026 年 4 月 19 日（日）",
    EVENT_TIME: "22:30 - 01:30",
    EVENT_LOCATION: "板橋藍鵲排球場",
  };
</script>
<!-- ========================================= -->

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    color: #1a1a1a;
  }

  .header {
    background: linear-gradient(160deg, #3a86d4 0%, #1a5fa8 100%);
    padding: 28px 20px 32px;
    text-align: center;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: "";
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .header-icon { font-size: 48px; margin-bottom: 10px; }
  .header-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .header-sub { font-size: 13px; opacity: 0.88; }

  .body { padding: 16px; max-width: 480px; margin: 0 auto; }

  .card {
    background: white;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: #1a5fa8;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 6px 0;
    font-size: 14px;
    color: #333;
    border-bottom: 0.5px solid #f0f0f0;
  }
  .info-row:last-child { border-bottom: none; }
  .info-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  .form-group { margin-bottom: 16px; }
  .form-label {
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 8px;
    display: block;
  }
  .form-label span { font-weight: 400; color: #aaa; font-size: 12px; }

  input[type="text"] {
    width: 100%;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 15px;
    font-family: inherit;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.2s;
    background: white;
  }
  input[type="text"]:focus { border-color: #3a86d4; }
  input[type="text"]::placeholder { color: #bbb; }

  .pill-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill {
    padding: 8px 18px;
    border-radius: 24px;
    font-size: 14px;
    background: #f5f5f5;
    color: #555;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .pill.selected {
    background: #e8f2ff;
    color: #1a5fa8;
    border-color: #3a86d4;
    font-weight: 600;
  }

  textarea {
    width: 100%;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    color: #333;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: #3a86d4; }

  .submit-btn {
    width: 100%;
    background: #3a86d4;
    color: white;
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s, transform 0.1s;
    -webkit-appearance: none;
  }
  .submit-btn:active { transform: scale(0.98); background: #1a5fa8; }
  .submit-btn:disabled { background: #b0bec5; cursor: not-allowed; }

  .loading-state, .success-state, .duplicate-state {
    text-align: center;
    padding: 40px 20px;
  }
  .state-icon { font-size: 56px; margin-bottom: 16px; }
  .state-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #1a1a1a; }
  .state-sub { font-size: 14px; color: #666; line-height: 1.7; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #e0e0e0;
    border-top-color: #3a86d4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    font-size: 12px;
    color: #e24b4a;
    margin-top: 6px;
    display: none;
  }
  .error-msg.show { display: block; }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #323232;
    color: white;
    padding: 12px 20px;
    border-radius: 24px;
    font-size: 14px;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="main-content">
  <div class="header">
    <div class="header-icon">🏐</div>
    <div class="header-title">婚禮排球派對</div>
    <div class="header-sub" id="header-sub"></div>
  </div>

  <div class="body">
    <div class="card">
      <div class="card-title"><span>📋</span> 活動資訊</div>
      <div class="info-row"><span class="info-icon">📅</span><span id="display-date"></span></div>
      <div class="info-row"><span class="info-icon">⏰</span><span id="display-time"></span></div>
      <div class="info-row"><span class="info-icon">📍</span><span id="display-location"></span></div>
    </div>

    <div class="card">
      <div class="card-title"><span>✍️</span> 填寫報名資料</div>

      <div class="form-group">
        <label class="form-label">您的名字</label>
        <input type="text" id="name-input" placeholder="請輸入您的姓名" maxlength="20" autocomplete="off">
        <div class="error-msg" id="name-error">請填寫您的名字</div>
      </div>

      <div class="form-group">
        <label class="form-label">報名人數 <span>（含您自己）</span></label>
        <div class="pill-group" id="count-pills">
          <div class="pill selected" data-value="1">1 人</div>
          <div class="pill" data-value="2">2 人</div>
          <div class="pill" data-value="3">3 人</div>
          <div class="pill" data-value="4">4 人以上</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">備註 <span>（可不填）</span></label>
        <textarea id="note" rows="2" placeholder="">請說出任何想說的話</textarea>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitForm()">確認報名</button>
    </div>
  </div>
</div>

<div id="success-state" style="display:none;" class="body">
  <div class="card success-state">
    <div class="state-icon">🎉</div>
    <div class="state-title">報名成功！</div>
    <div class="state-sub" id="success-msg"></div>
  </div>
</div>

<div id="duplicate-state" style="display:none;" class="body">
  <div class="card duplicate-state">
    <div class="state-icon">✅</div>
    <div class="state-title">您已經報名了！</div>
    <div class="state-sub">如需修改請聯絡主辦人。</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let selectedCount = "1";

function init() {
  document.getElementById("header-sub").textContent = CONFIG.EVENT_NAME;
  document.getElementById("display-date").textContent = CONFIG.EVENT_DATE;
  document.getElementById("display-time").textContent = CONFIG.EVENT_TIME;
  document.getElementById("display-location").textContent = CONFIG.EVENT_LOCATION;

  document.querySelectorAll("#count-pills .pill").forEach(pill => {
    pill.addEventListener("click", () => {
      document.querySelectorAll("#count-pills .pill").forEach(p => p.classList.remove("selected"));
      pill.classList.add("selected");
      selectedCount = pill.dataset.value;
    });
  });
}

async function submitForm() {
  const nameInput = document.getElementById("name-input");
  const nameError = document.getElementById("name-error");
  const name = nameInput.value.trim();

  // 驗證名字
  nameError.classList.remove("show");
  if (!name) {
    nameError.classList.add("show");
    nameInput.focus();
    return;
  }

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "送出中...";

  const payload = {
    lineName: name,
    lineUserId: "WEB_" + name,  // 用名字當 ID，防止同名重複報名
    lineAvatar: "",
    count: selectedCount,
    note: document.getElementById("note").value.trim()
  };

  try {
    const res = await fetch(CONFIG.GAS_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (data.success) {
      document.getElementById("success-msg").textContent =
        `${name}，已幫您登記 ${selectedCount} 人！\n期待在球場見到您 🏐`;
      showState("success-state");
    } else if (data.message && data.message.includes("報名過了")) {
      showState("duplicate-state");
    } else {
      showToast(data.message || "發生錯誤，請再試一次");
      btn.disabled = false;
      btn.textContent = "確認報名";
    }
  } catch (e) {
    showToast("網路錯誤，請再試一次");
    btn.disabled = false;
    btn.textContent = "確認報名";
  }
}

function showState(stateId) {
  document.getElementById("main-content").style.display = "none";
  document.getElementById("success-state").style.display = "none";
  document.getElementById("duplicate-state").style.display = "none";
  document.getElementById(stateId).style.display = "block";
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 3000);
}

init();
</script>
</body>
</html>
