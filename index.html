<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>婚禮排球派對報名</title>

<!-- ===== 設定區（你需要修改這裡）===== -->
<script>
  const CONFIG = {
    LIFF_ID: "2009755669-XYp9fiFC",                   // 從 LINE Developers 取得
    GAS_URL: "https://script.google.com/macros/s/AKfycbx_c2TCpZILy4dryJClkEifq7xZrgghMgwzTUSY1o37jJx3bzD6_oiH12kkPaAD70ccMg/exec",           // 部署後的 Web App URL
    EVENT_NAME: "Berny & Peggy 婚禮排球派對",
    EVENT_DATE: "2026 年 4 月 8 日（六）",
    EVENT_TIME: "22:00 – 02:00",
    EVENT_LOCATION: "板橋藍鵲",
    MAX_PEOPLE: 100,                             // 人數上限
  };
</script>
<!-- ========================================= -->

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: #f0f4f0;
    min-height: 100vh;
    color: #1a1a1a;
  }

  /* Header */
  .header {
    background: linear-gradient(160deg, #43a868 0%, #2e8b57 100%);
    padding: 24px 20px 28px;
    text-align: center;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: "";
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .avatar-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 10px;
  }
  .avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.8);
    object-fit: cover;
    display: block;
    background: #81C784;
  }
  .avatar-placeholder {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.8);
    background: #81C784;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .line-badge {
    position: absolute;
    bottom: -2px; right: -2px;
    background: #06C755;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid white;
    display: flex; align-items: center; justify-content: center;
  }
  .line-badge svg { width: 11px; height: 11px; fill: white; }
  .user-name { font-size: 17px; font-weight: 700; margin-bottom: 2px; }
  .event-title { font-size: 13px; opacity: 0.9; }

  /* Body */
  .body { padding: 16px; max-width: 480px; margin: 0 auto; }

  /* Card */
  .card {
    background: white;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: #2e8b57;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Event info */
  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 6px 0;
    font-size: 14px;
    color: #333;
    border-bottom: 0.5px solid #f0f0f0;
  }
  .info-row:last-child { border-bottom: none; }
  .info-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  /* Count bar */
  .count-bar-wrap { margin-top: 10px; }
  .count-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #888;
    margin-bottom: 6px;
  }
  .count-bar-bg {
    background: #e8f5e9;
    border-radius: 8px;
    height: 8px;
    overflow: hidden;
  }
  .count-bar-fill {
    background: linear-gradient(90deg, #43a868, #2e8b57);
    height: 100%;
    border-radius: 8px;
    transition: width 0.6s ease;
  }

  /* Form */
  .form-group { margin-bottom: 14px; }
  .form-label {
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 8px;
    display: block;
  }
  .form-label span { font-weight: 400; color: #aaa; font-size: 12px; }

  .prefilled-box {
    background: #f0faf4;
    border: 1px solid #c8e6c9;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    color: #2e8b57;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pill-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill {
    padding: 8px 16px;
    border-radius: 24px;
    font-size: 14px;
    background: #f5f5f5;
    color: #555;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .pill.selected {
    background: #e8f5e9;
    color: #2e8b57;
    border-color: #43a868;
    font-weight: 600;
  }

  textarea {
    width: 100%;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    color: #333;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: #43a868; }

  /* Submit */
  .submit-btn {
    width: 100%;
    background: #43a868;
    color: white;
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s, transform 0.1s;
    -webkit-appearance: none;
  }
  .submit-btn:active { transform: scale(0.98); background: #2e8b57; }
  .submit-btn:disabled { background: #b0bec5; cursor: not-allowed; }

  /* States */
  .loading-state, .success-state, .duplicate-state, .full-state {
    text-align: center;
    padding: 40px 20px;
  }
  .state-icon { font-size: 56px; margin-bottom: 16px; }
  .state-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .state-sub { font-size: 14px; color: #666; line-height: 1.6; }

  .spinner {
    width: 44px; height: 44px;
    border: 3px solid #e0e0e0;
    border-top-color: #43a868;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #323232;
    color: white;
    padding: 12px 20px;
    border-radius: 24px;
    font-size: 14px;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="loading-state" class="card" style="margin: 32px 16px; text-align:center; padding: 40px;">
  <div class="spinner"></div>
  <div style="font-size:14px; color:#888;">載入中...</div>
</div>

<div id="main-content" style="display:none;">
  <!-- Header -->
  <div class="header">
    <div class="avatar-wrap">
      <img id="user-avatar" class="avatar" src="" alt="" onerror="this.style.display='none'; document.getElementById('avatar-fallback').style.display='flex';">
      <div id="avatar-fallback" class="avatar-placeholder" style="display:none;">🏐</div>
      <div class="line-badge">
        <svg viewBox="0 0 24 24"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
      </div>
    </div>
    <div class="user-name" id="user-name">載入中...</div>
    <div class="event-title" id="event-title-header"></div>
  </div>

  <div class="body">
    <!-- 活動資訊 -->
    <div class="card">
      <div class="card-title">
        <span>🏐</span> 活動資訊
      </div>
      <div class="info-row"><span class="info-icon">📅</span><span id="display-date"></span></div>
      <div class="info-row"><span class="info-icon">⏰</span><span id="display-time"></span></div>
      <div class="info-row"><span class="info-icon">📍</span><span id="display-location"></span></div>

      <div class="count-bar-wrap">
        <div class="count-bar-label">
          <span>目前報名人數</span>
          <span id="count-text">載入中...</span>
        </div>
        <div class="count-bar-bg">
          <div class="count-bar-fill" id="count-bar" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <!-- 報名表單 -->
    <div class="card" id="form-card">
      <div class="card-title">
        <span>✍️</span> 填寫報名資料
      </div>

      <div class="form-group">
        <label class="form-label">LINE 名稱 <span>（自動帶入）</span></label>
        <div class="prefilled-box">
          <span>🔗</span>
          <span id="display-line-name">載入中...</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">報名人數 <span>（含你自己）</span></label>
        <div class="pill-group" id="count-pills">
          <div class="pill selected" data-value="1">1 人</div>
          <div class="pill" data-value="2">2 人</div>
          <div class="pill" data-value="3">3 人</div>
          <div class="pill" data-value="4">4 人以上</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">備註 <span>（可不填）</span></label>
        <textarea id="note" rows="2" placeholder="例：請說出任何你想說的話<3"></textarea>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitForm()">確認報名</button>
    </div>
  </div>
</div>

<!-- 成功畫面 -->
<div id="success-state" style="display:none;" class="body">
  <div class="card success-state">
    <div class="state-icon">🎉</div>
    <div class="state-title">報名成功！</div>
    <div class="state-sub" id="success-msg"></div>
  </div>
</div>

<!-- 重複報名 -->
<div id="duplicate-state" style="display:none;" class="body">
  <div class="card duplicate-state">
    <div class="state-icon">✅</div>
    <div class="state-title">你已經報名了！</div>
    <div class="state-sub">期待在球場上見到你～<br>如需修改請聯絡我們~。</div>
  </div>
</div>

<!-- 額滿 -->
<div id="full-state" style="display:none;" class="body">
  <div class="card full-state">
    <div class="state-icon">😢</div>
    <div class="state-title">名額已滿</div>
    <div class="state-sub">本次活動人數已達上限<br>請聯絡主辦人候補。</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let lineProfile = null;
let selectedCount = "1";

async function init() {
  // 填入活動資訊
  document.getElementById("event-title-header").textContent = CONFIG.EVENT_NAME;
  document.getElementById("display-date").textContent = CONFIG.EVENT_DATE;
  document.getElementById("display-time").textContent = CONFIG.EVENT_TIME;
  document.getElementById("display-location").textContent = CONFIG.EVENT_LOCATION;

  // 初始化 LIFF
  try {
    await liff.init({ liffId: CONFIG.LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    lineProfile = await liff.getProfile();

    document.getElementById("user-name").textContent = lineProfile.displayName;
    document.getElementById("display-line-name").textContent = lineProfile.displayName;
    if (lineProfile.pictureUrl) {
      document.getElementById("user-avatar").src = lineProfile.pictureUrl;
    }

  } catch (err) {
    // LIFF 載入失敗（例如在一般瀏覽器開啟）→ 使用 demo 模式
    console.warn("LIFF init failed, running in demo mode:", err);
    lineProfile = { userId: "DEMO_" + Date.now(), displayName: "訪客（測試模式）", pictureUrl: "" };
    document.getElementById("user-name").textContent = lineProfile.displayName;
    document.getElementById("display-line-name").textContent = lineProfile.displayName;
  }

  // 取得人數 & 確認是否已報名
  await refreshCount();

  // 設定 pills
  setupPills("count-pills", (v) => { selectedCount = v; });

  document.getElementById("loading-state").style.display = "none";
  document.getElementById("main-content").style.display = "block";
}

async function refreshCount() {
  try {
    const res = await fetch(`${CONFIG.GAS_URL}?action=getCount`);
    const data = await res.json();
    const pct = Math.min((data.totalPeople / CONFIG.MAX_PEOPLE) * 100, 100);
    document.getElementById("count-text").textContent = `${data.totalPeople} / ${CONFIG.MAX_PEOPLE} 人`;
    document.getElementById("count-bar").style.width = pct + "%";

    if (data.totalPeople >= CONFIG.MAX_PEOPLE) {
      showState("full-state");
      return;
    }

    // 確認是否已報名
    const dupRes = await fetch(`${CONFIG.GAS_URL}?action=checkDuplicate&lineUserId=${lineProfile.userId}`);
    const dupData = await dupRes.json();
    if (dupData.duplicate) {
      showState("duplicate-state");
    }
  } catch (e) {
    console.warn("無法取得人數資料", e);
    document.getElementById("count-text").textContent = "無法取得";
  }
}

function setupPills(containerId, callback) {
  const container = document.getElementById(containerId);
  container.querySelectorAll(".pill").forEach(pill => {
    pill.addEventListener("click", () => {
      container.querySelectorAll(".pill").forEach(p => p.classList.remove("selected"));
      pill.classList.add("selected");
      callback(pill.dataset.value);
    });
  });
}

async function submitForm() {
  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "送出中...";

  const payload = {
    lineUserId: lineProfile.userId,
    lineName: lineProfile.displayName,
    lineAvatar: lineProfile.pictureUrl || "",
    count: selectedCount,
    note: document.getElementById("note").value.trim()
  };

  try {
    const res = await fetch(CONFIG.GAS_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (data.success) {
      document.getElementById("success-msg").textContent =
        `${lineProfile.displayName}，已幫你登記 ${selectedCount} 人報名！\n期待在球場見到你 🏐`;
      showState("success-state");
    } else {
      showToast(data.message || "發生錯誤，請再試一次");
      btn.disabled = false;
      btn.textContent = "確認報名";
    }
  } catch (e) {
    showToast("網路錯誤，請再試一次");
    btn.disabled = false;
    btn.textContent = "確認報名";
  }
}

function showState(stateId) {
  document.getElementById("loading-state").style.display = "none";
  document.getElementById("main-content").style.display = "none";
  document.getElementById("success-state").style.display = "none";
  document.getElementById("duplicate-state").style.display = "none";
  document.getElementById("full-state").style.display = "none";
  document.getElementById(stateId).style.display = "block";
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 3000);
}

init();
</script>
</body>
</html>
